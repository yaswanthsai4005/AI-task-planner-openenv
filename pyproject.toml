[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-task-planner"
version = "0.1.0"
description = "AI Task Planner for OpenEnv"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "torch==2.1.0",
    "openenv-core>=0.2.0",
    "openai",
    "pydantic"
]
authors = [
    {name = "Yash"}
]

[project.scripts]
server = "server.app:main"

[tool.openenv]
entrypoint = "environment:TaskEnv"
